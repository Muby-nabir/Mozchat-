<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mozchat - Oficial</title>
    <style>
        body { font-family: sans-serif; background: #0b141a; color: #e9edef; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        .topo { background: #202c33; padding: 15px; text-align: center; color: #00a884; font-weight: bold; font-size: 20px; border-bottom: 1px solid #333; }
        #chat { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .msg { background: #202c33; padding: 10px; border-radius: 10px; max-width: 80%; font-size: 15px; }
        .minha { align-self: flex-end; background: #005c4b; }
        .rodape { background: #202c33; padding: 10px; display: flex; flex-direction: column; gap: 10px; }
        .botoes-arquivos { display: flex; justify-content: space-around; }
        .btn-acao { background: #3b4a54; color: white; border: none; padding: 8px; border-radius: 5px; font-size: 12px; }
        .live-btn { background: #ea0038; font-weight: bold; }
        .input-linha { display: flex; gap: 5px; }
        input[type="text"] { flex: 1; padding: 12px; border-radius: 20px; border: none; background: #2a3942; color: white; outline: none; }
        .btn-enviar { background: #00a884; color: white; border: none; padding: 10px 18px; border-radius: 50%; font-weight: bold; }
    </style>
</head>
<body>

<div class="topo">Mozchat 📱</div>

<div id="chat">
    <div class="msg"><b>Sistema:</b> Mozchat criado com sucesso! Este é o seu espaço.</div>
</div>

<div class="rodape">
    <div class="botoes-arquivos">
        <button class="btn-acao" onclick="alert('Selecionar Arquivo/Foto')">📁 Foto/Doc</button>
        <button class="btn-acao" onclick="alert('Gravando Áudio...')">🎤 Áudio</button>
        <button class="btn-acao live-btn" onclick="alert('Iniciando Live...')">🔴 LIVE</button>
    </div>
    <div class="input-linha">
        <input type="text" id="campo-msg" placeholder="Sua mensagem...">
        <button class="btn-enviar" onclick="enviar()">></button>
    </div>
</div>

<script>
    function enviar() {
        const input = document.getElementById('campo-msg');
        const chat = document.getElementById('chat');
        if(input.value) {
            const div = document.createElement('div');
            div.className = "msg minha";
            div.innerHTML = "<b>Você:</b><br>" + input.value;
            chat.appendChild(div);
            input.value = "";
            chat.scrollTop = chat.scrollHeight;
        }
    }
</script>

</body>
</html>
